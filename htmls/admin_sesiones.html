<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sesiones Activas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

        [data-theme="dark"] {
          --bg:#0f1117; --surface:#181c27; --surface2:#1e2336; --surface3:#242840;
          --border:#2a3050; --border2:#3a4470;
          --text:#d4daf0; --text-dim:#7a85a8; --text-bright:#eef2ff;
          --accent:#4a7cff; --accent2:#2d55cc; --accent-text:#fff;
          --red-bg:#3a1015; --red-b:#7a2530; --red-t:#f06070;
          --shadow:rgba(0,0,0,.5);
        }

        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding: 40px 20px; display: flex; justify-content: center;}

        .container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 16px var(--shadow);
            overflow: hidden;
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 16px; font-weight: 600; color: var(--text-bright); }
        .header a { color: var(--text-dim); text-decoration: none; font-size: 12px; }
        .header a:hover { color: var(--text); }

        table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 12px;}
        th { padding: 10px 20px; text-align: left; background: var(--surface2); color: var(--text-dim); font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 12px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        .btn-kick { background: transparent; border: 1px solid var(--red-b); color: var(--red-t); padding: 5px 10px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; font-weight: 600;}
        .btn-kick:hover { background: var(--red-bg); }
        
        .badge { background: var(--surface3); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border2); }
        .badge.warning { border-color: var(--red-b); color: var(--red-t); background: var(--red-bg); }

        .empty-state { padding: 40px; text-align: center; color: var(--text-dim); font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Monitor de Conexiones</h1>
            <a href="/">← Volver al Panel</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Sesiones Abiertas</th>
                    <th style="text-align: right;">Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-sesiones">
                <tr><td colspan="3" class="empty-state">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function cargarSesiones() {
            try {
                const res = await fetch('/api/sesiones');
                const data = await res.json();
                
                const tbody = document.getElementById('tabla-sesiones');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-state">No hay usuarios conectados</td></tr>';
                    return;
                }

                data.forEach(item => {
                    // Resaltamos si alguien tiene más de 1 conexión
                    const badgeClass = item.conexiones > 1 ? 'badge warning' : 'badge';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight: 500; color: var(--text-bright);">${item.usuario}</td>
                            <td><span class="${badgeClass}">${item.conexiones} activa(s)</span></td>
                            <td style="text-align: right;">
                                ${item.usuario !== 'admin' 
                                    ? `<button class="btn-kick" onclick="patear('${item.usuario}')">Desconectar</button>` 
                                    : `<span style="color: var(--text-dim); font-size: 11px;">Intocable</span>`}
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error("Error al cargar sesiones", e);
            }
        }

        async function patear(usuario) {
            if(!confirm(`¿Seguro que querés desconectar a ${usuario} de todos los dispositivos?`)) return;

            const res = await fetch('/api/patear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: usuario })
            });

            if (res.ok) {
                cargarSesiones();
            }
        }

        // Carga al entrar y actualiza cada 5 segundos
        cargarSesiones();
        setInterval(cargarSesiones, 5000);
    </script>
</body>
</html>
